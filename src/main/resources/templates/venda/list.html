<!DOCTYPE html>

<html th:replace="~{fragments/layout :: layout(~{::head}, ~{::main}, ~{})}">

<head th:replace="~{fragments/head :: head('Vendas',~{})}"></head>

<body>

<main class="pg-card">

    <h1>
        <i class="icon-bag text-muted"></i>
        Vendas
    </h1>
    <table>
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Data</th>
            <th scope="col">Cliente</th>
            <th scope="col">Total</th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="venda : ${vendas}">
            <td scope="row" th:text="${venda.id}"></td>
            <td th:text="${#temporals.format(venda.data, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${venda.cliente.nomeExibicao}"></td>
            <td th:text="'R$ ' + ${#numbers.formatDecimal(venda.total, 1, 'POINT', 2, 'COMMA')}"></td>
            <td class="text-end">
                <a th:href="@{/vendas/detalhes/{id}(id=${venda.id})}"
                   type="button" class="button-primary"
                   data-bs-toggle="tooltip"
                   data-bs-placement="top"
                   title="Ver detalhes da venda">
                    <i class="icon-search"></i>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</main>

</body>
</html>
