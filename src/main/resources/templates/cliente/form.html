<!DOCTYPE html>

<html th:replace="~{fragments/layout :: layout(~{::head}, ~{::main}, ~{::script})}">

<head th:replace="~{fragments/head :: head('Cadastrar Cliente',~{})}"></head>

<body>

<main class="pg-card">

    <h1>Cadastrar Cliente</h1>
    <p class="fw-light">Todos os campos são obrigatórios</p>

    <div th:replace="~{fragments/alert :: alert(${erro})}"></div>

    <ul class="nav-tab">
        <li>
            <a class="active" id="nav-item-pf" aria-current="page" href="#">Pessoa Física</a>
        </li>
        <li>
            <a id="nav-item-pj" href="#">Pessoa Jurídica</a>
        </li>
    </ul>

    <form class="mt-3" id="form-cadastro-cliente" th:action="@{/clientes/save/fisica}" method="post">

        <input type="hidden" id="id" name="id">

        <div id="campos-pf">
            <div class="mb-4">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" required>
            </div>
            <div class="mb-4">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>
            </div>
        </div>

        <div id="campos-pj" hidden>
            <div class="mb-4">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="Ex: 00.000.000/0000-00" required disabled>
            </div>

            <div class="mb-4">
                <label for="razao_social">Razão Social</label>
                <input type="text" id="razao_social" name="razaoSocial" placeholder="Ex: Empresa LTDA." required disabled>
            </div>
        </div>

        <div class="mb-4">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Ex: exemplo@gmail.com" required>
        </div>

        <div class="mb-4">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" placeholder="Ex: (00) 1234-5678" required>
        </div>

        <hr>

        <button type="submit" class="button-primary">Cadastrar Cliente</button>
    </form>

</main>

<script th:src="@{/js/cliente-form.js}"></script>

</body>
</html>
